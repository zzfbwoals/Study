<script>
    // 전호번호 웨이팅 같은거
    const pr = new Promise((resolve, reject) => {
        setTimeout(()=>{
            resolve('OK')
            //reject(new Error('err...'));
        }, 3000)
    });

    pr.then(
        function(result){ // 위의 ok가 들어옴
            console.log(result + ' 가지러 가자.');
        }
    ).catch(
        function(err){
            console.log('다시 주문해주세요..');
        }
    ).finally(
        function(){
            console.log('---주문 끝---');
        }
    )
