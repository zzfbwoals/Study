<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Class</title>
</head>
<body>
    <h1>hello Class!</h1>
</body>
</html>
<script>
    class User {
        constructor(name, age) {
            this.name = name;
            this.age = age;
        }
        showName() { // 프로토타입에 저장, for in 문에서 제외
            console.log(this.name);
        }
    }
    const tom = new User("Tom", 19);
    // 객체는 new 없어도 에러가 나지 않아서 나중에 뭐가 문제인지 인지하기 어려움 -> 클래스 사용하는 이유

    class Car {
        constructor(color) {
            this.color = color;
            this.wheels = 4;
        }
        drive() {
            console.log("부르릉");
        }
        stop() {
            console.log("끼익");
        }
    }

    class Bmw extends Car {
        // 생성자가 없으면 그냥 부모 생성자 실행
        constructor(color) { // color도 똑같이 있어야함 -> 없으면 undefined
            super(color); // super로 부모 생성자를 먼저 실행해줘야 함. (아니면 에러)
            this.navigation = 1; 
        }
        park() {
            console.log("Park");
        }
        stop() {
            console.log("끼이이이익ㄱ"); // Bmw 객체에서 stop시 해당 메서드 우선 실행 -> 부모 메서드 쓰고 싶으면 super.stop() 사용
        }
    }
    const z4 = new Bmw("blue");
    // park는 프로토타입에 drive와 stop은 프로토타입의 프로토타입에
</script>
